name: autodiscover-email-settings
services:
  autodiscover:
    image: jogerj/autodiscover-email-settings:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      COMPANY_NAME: "ACME Company"
      SUPPORT_URL: "https://autodiscover.example.com"
      DOMAIN: "example.com"

      IMAP_HOST: "imap.example.com"
      IMAP_PORT: "993"
      IMAP_SOCKET: "SSL"

      POP_HOST: "pop3.example.com"
      POP_PORT: "995"
      POP_SOCKET: "SSL"

      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_SOCKET: "STARTTLS"

      MOBILESYNC_URL: ""
      MOBILESYNC_NAME: ""

      LDAP_HOST: ""
      LDAP_PORT: ""
      LDAP_SOCKET: ""
      LDAP_BASE: ""
      LDAP_USER_FIELD: ""
      LDAP_USER_BASE: ""
      LDAP_SEARCH: ""

      PROFILE_IDENTIFIER: "com.example.autodiscover"
      # Sensitive — set via .env file or secrets manager, do not hardcode here
      PROFILE_UUID: "12345678-1234-4444-1234-1234567890ab"
      MAIL_UUID: "12345678-1234-4444-1234-1234567890ac"
      LDAP_UUID: ""
